name: Sync Skills to Orchestra
on:
  workflow_dispatch: {}
jobs:
  sync-skills:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Detect changed skill folders
      id: changes
      run: "# Get list of changed files in last commit\nCHANGED_FILES=$(git diff --name-only\
        \ HEAD^..HEAD)\n\necho \"Changed files:\"\necho \"$CHANGED_FILES\"\n\n# Find\
        \ skill directories - supports two patterns:\n# Pattern 1: XX-category/skill-name/SKILL.md\
        \ (nested skills)\n# Pattern 2: XX-category/SKILL.md (standalone skills like\
        \ 20-ml-paper-writing)\n\nSKILL_DIRS=\"\"\n\n# Pattern 1: Nested skills (XX-category/skill-name/)\n\
        NESTED=$(echo \"$CHANGED_FILES\" | grep -E '^[0-9]{2}-[^/]+/[^/]+/' | sed\
        \ -E 's|^([0-9]{2}-[^/]+/[^/]+)/.*|\\1|' | sort -u)\nif [ -n \"$NESTED\" ];\
        \ then\n  SKILL_DIRS=\"$NESTED\"\nfi\n\n# Pattern 2: Standalone skills (XX-category/\
        \ with SKILL.md directly inside)\nSTANDALONE=$(echo \"$CHANGED_FILES\" | grep\
        \ -E '^[0-9]{2}-[^/]+/SKILL\\.md$' | sed -E 's|^([0-9]{2}-[^/]+)/SKILL\\.md$|\\\
        1|' | sort -u)\nif [ -n \"$STANDALONE\" ]; then\n  if [ -n \"$SKILL_DIRS\"\
        \ ]; then\n    SKILL_DIRS=$(printf \"%s\\n%s\" \"$SKILL_DIRS\" \"$STANDALONE\"\
        \ | sort -u)\n  else\n    SKILL_DIRS=\"$STANDALONE\"\n  fi\nfi\n\necho \"\
        Changed skill directories:\"\necho \"$SKILL_DIRS\"\n\n# Convert to JSON array\
        \ for matrix\nif [ -z \"$SKILL_DIRS\" ]; then\n  SKILLS_JSON=\"[]\"\n  SKILL_COUNT=0\n\
        else\n  SKILLS_JSON=$(echo \"$SKILL_DIRS\" | jq -R -s -c 'split(\"\\n\") |\
        \ map(select(length > 0))')\n  SKILL_COUNT=$(echo \"$SKILL_DIRS\" | grep -c\
        \ . || echo \"0\")\nfi\n\necho \"skills=$SKILLS_JSON\" >> $GITHUB_OUTPUT\n\
        echo \"count=$SKILL_COUNT\" >> $GITHUB_OUTPUT\n"
    - name: Process and sync skills
      if: steps.changes.outputs.count > 0
      env:
        ORCHESTRA_API_URL: ${{ secrets.ORCHESTRA_API_URL }}
        ORCHESTRA_SYNC_API_KEY: ${{ secrets.ORCHESTRA_SYNC_API_KEY }}
      run: "SKILLS='${{ steps.changes.outputs.skills }}'\n\necho \"Processing $(echo\
        \ $SKILLS | jq 'length') skill(s)...\"\n\n# Install jq for JSON processing\n\
        sudo apt-get update && sudo apt-get install -y jq zip\n\n# Loop through each\
        \ skill directory\necho \"$SKILLS\" | jq -r '.[]' | while read SKILL_PATH;\
        \ do\n  echo \"===================================================\"\n  echo\
        \ \"Processing: $SKILL_PATH\"\n  echo \"===================================================\"\
        \n\n  # Check if SKILL.md exists\n  if [ ! -f \"$SKILL_PATH/SKILL.md\" ];\
        \ then\n    echo \"\u26A0\uFE0F  WARNING: No SKILL.md found in $SKILL_PATH,\
        \ skipping\"\n    continue\n  fi\n\n  # Extract skill name from SKILL.md frontmatter\n\
        \  SKILL_NAME=$(grep -A 20 \"^---$\" \"$SKILL_PATH/SKILL.md\" | grep \"^name:\"\
        \ | head -1 | sed 's/name: *//;s/\"//g;s/'\\''//g' | tr -d '\\r')\n\n  # Extract\
        \ author from SKILL.md frontmatter\n  AUTHOR=$(grep -A 20 \"^---$\" \"$SKILL_PATH/SKILL.md\"\
        \ | grep \"^author:\" | head -1 | sed 's/author: *//;s/\"//g;s/'\\''//g' |\
        \ tr -d '\\r')\n\n  # Default values\n  if [ -z \"$SKILL_NAME\" ]; then\n\
        \    # Extract from directory name as fallback\n    SKILL_NAME=$(basename\
        \ \"$SKILL_PATH\")\n    echo \"\u26A0\uFE0F  No 'name' in frontmatter, using\
        \ directory name: $SKILL_NAME\"\n  fi\n\n  if [ -z \"$AUTHOR\" ]; then\n \
        \   AUTHOR=\"Orchestra Research\"\n    echo \"\u26A0\uFE0F  No 'author' in\
        \ frontmatter, defaulting to: $AUTHOR\"\n  fi\n\n  echo \"Skill Name: $SKILL_NAME\"\
        \n  echo \"Author: $AUTHOR\"\n  echo \"Path: $SKILL_PATH\"\n\n  # Create temporary\
        \ directory for zipping\n  TEMP_DIR=$(mktemp -d)\n  SKILL_DIR=\"$TEMP_DIR/$SKILL_NAME\"\
        \n  mkdir -p \"$SKILL_DIR\"\n\n  # Copy all contents of skill directory (SKILL.md,\
        \ references/, scripts/, assets/, etc.)\n  cp -r \"$SKILL_PATH\"/* \"$SKILL_DIR/\"\
        \ 2>/dev/null || true\n\n  # Create zip file (exclude hidden files and .gitkeep)\n\
        \  ZIP_FILE=\"$TEMP_DIR/${SKILL_NAME}.zip\"\n  cd \"$TEMP_DIR\"\n  zip -r\
        \ \"$ZIP_FILE\" \"$SKILL_NAME\" -x \"*/.*\" \"*/.gitkeep\" \"*.DS_Store\"\n\
        \  cd -\n\n  # Verify zip was created\n  if [ ! -f \"$ZIP_FILE\" ]; then\n\
        \    echo \"\u274C ERROR: Failed to create zip file for $SKILL_NAME\"\n  \
        \  continue\n  fi\n\n  echo \"\u2713 Created zip: $(ls -lh \"$ZIP_FILE\" |\
        \ awk '{print $5}')\"\n\n  # Write SKILL.md content to temp file (avoid argument\
        \ length limits)\n  SKILL_MD_FILE=\"$TEMP_DIR/skill.md\"\n  cat \"$SKILL_PATH/SKILL.md\"\
        \ > \"$SKILL_MD_FILE\"\n\n  # Encode zip to base64 and write to temp file\
        \ (avoid argument length limits)\n  ZIP_BASE64_FILE=\"$TEMP_DIR/base64.txt\"\
        \n  base64 -w 0 \"$ZIP_FILE\" > \"$ZIP_BASE64_FILE\" 2>/dev/null || base64\
        \ \"$ZIP_FILE\" > \"$ZIP_BASE64_FILE\"\n\n  # Prepare JSON payload (use --rawfile\
        \ for large content)\n  JSON_PAYLOAD=$(jq -n \\\n    --arg skillName \"$SKILL_NAME\"\
        \ \\\n    --arg skillPath \"$SKILL_PATH\" \\\n    --arg author \"$AUTHOR\"\
        \ \\\n    --rawfile skillMdContent \"$SKILL_MD_FILE\" \\\n    --rawfile zipBase64\
        \ \"$ZIP_BASE64_FILE\" \\\n    '{\n      skillName: $skillName,\n      skillPath:\
        \ $skillPath,\n      author: $author,\n      skillMdContent: $skillMdContent,\n\
        \      zipBase64: $zipBase64\n    }')\n\n  # Send to Orchestra API (write\
        \ JSON to file to avoid argument length limits)\n  echo \"\U0001F4E4 Uploading\
        \ to Orchestra...\"\n  JSON_FILE=\"$TEMP_DIR/payload.json\"\n  echo \"$JSON_PAYLOAD\"\
        \ > \"$JSON_FILE\"\n\n  RESPONSE=$(curl -s -w \"\\n%{http_code}\" -L \\\n\
        \    -X POST \\\n    -H \"Content-Type: application/json\" \\\n    -H \"X-Admin-API-Key:\
        \ $ORCHESTRA_SYNC_API_KEY\" \\\n    -d @\"$JSON_FILE\" \\\n    \"$ORCHESTRA_API_URL/api/admin/sync-github-skill\"\
        )\n\n  HTTP_CODE=$(echo \"$RESPONSE\" | tail -n1)\n  BODY=$(echo \"$RESPONSE\"\
        \ | sed '$d')\n\n  echo \"HTTP Status: $HTTP_CODE\"\n  echo \"Response: $BODY\"\
        \n\n  if [ \"$HTTP_CODE\" = \"200\" ]; then\n    ACTION=$(echo \"$BODY\" |\
        \ jq -r '.action // \"synced\"')\n    SOURCE=$(echo \"$BODY\" | jq -r '.source\
        \ // \"unknown\"')\n    echo \"\u2705 SUCCESS: Skill $SKILL_NAME $ACTION (source:\
        \ $SOURCE)\"\n  else\n    ERROR_MSG=$(echo \"$BODY\" | jq -r '.error // \"\
        Unknown error\"')\n    echo \"\u274C FAILED: $ERROR_MSG\"\n    exit 1\n  fi\n\
        \n  # Cleanup\n  rm -rf \"$TEMP_DIR\"\n\n  echo \"\"\ndone\n\necho \"===================================================\"\
        \necho \"\u2705 Sync completed successfully!\"\necho \"===================================================\"\
        \n"
    - name: No changes detected
      if: steps.changes.outputs.count == 0
      run: "echo \"\u2139\uFE0F  No skill changes detected in this commit\"\necho\
        \ \"Only commits that modify skill directories will trigger sync\"\n"
